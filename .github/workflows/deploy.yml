name: Deploy to GitHub Pages (Bun)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment: github-pages
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install Bun (NIE Node)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 3️⃣ Install dependencies cez Bun
      - name: Install dependencies
        run: bun install

      # 4️⃣ Build cez Bun
      - name: Build
        run: bun run build

      # 5️⃣ Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6️⃣ Upload build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      # 7️⃣ Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
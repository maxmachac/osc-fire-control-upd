name: Deploy Portfolio (Bun + GitHub Pages)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Install Bun (NIE Node)
      - uses: oven-sh/setup-bun@v2

      # 3️⃣ Install dependencies cez Bun
      - run: bun install
        # 👉 nahrádza npm install

      # 4️⃣ Build projektu
      - run: bun run build
        # 👉 vytvorí dist/

      # 5️⃣ Deploy na GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

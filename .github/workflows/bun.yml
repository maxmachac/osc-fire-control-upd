name: Deploy Portfolio (Bun)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ stiahni repo
      - uses: actions/checkout@v4

      # 2️⃣ nainštaluj Bun (ŽIADNY Node)
      - uses: oven-sh/setup-bun@v2

      # 3️⃣ install dependencies
      - run: bun install

      # 4️⃣ build projektu
      - run: bun run build

      # 5️⃣ deploy na GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
